name: Publish

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install system deps
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install Python deps
        run: pip install numpy Pillow

      - name: Generate audio
        run: |
          for f in *.py; do
            case "$f" in render_video.py|generate_page.py) continue;; esac
            echo "=== Running $f ==="
            python3 "$f" || true
          done

      - name: Render videos
        run: python3 render_video.py

      - name: Convert wav to mp3 for web playback
        run: |
          mkdir -p docs/audio
          for f in output/*.wav; do
            [ -f "$f" ] || continue
            name=$(basename "$f" .wav)
            ffmpeg -y -i "$f" -codec:a libmp3lame -q:a 2 "docs/audio/${name}.mp3"
          done

      - name: Generate album page
        env:
          TAG: ${{ github.ref_name }}
        run: python3 generate_page.py

      - name: Deploy album page
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/
          git diff --cached --quiet || (git commit -m "update album page [skip ci]" && git push origin HEAD:main)

      - name: Find new files (incremental release)
        id: diff
        run: |
          # List assets from the previous release
          PREV=$(gh release list --limit 2 --json tagName -q '.[1].tagName // empty')
          if [ -n "$PREV" ]; then
            gh release view "$PREV" --json assets -q '.assets[].name' | sort > /tmp/prev_assets.txt
          else
            touch /tmp/prev_assets.txt
          fi
          # Current output
          ls output/*.wav output/*.mp4 2>/dev/null | xargs -I{} basename {} | sort > /tmp/cur_assets.txt
          # New files only
          comm -23 /tmp/cur_assets.txt /tmp/prev_assets.txt > /tmp/new_assets.txt
          # Build file list with full paths
          # Move new files to staging dir
          mkdir -p /tmp/release_assets
          while IFS= read -r f; do
            [ -f "output/$f" ] && cp "output/$f" /tmp/release_assets/
          done < /tmp/new_assets.txt
          COUNT=$(ls /tmp/release_assets/ 2>/dev/null | wc -l)
          echo "count=$COUNT" >> $GITHUB_OUTPUT
          echo "--- $COUNT new files to upload ---"
          cat /tmp/new_assets.txt
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: /tmp/release_assets/*
          generate_release_notes: true

      - name: Post to Moltbook
        continue-on-error: true
        if: env.MOLTBOOK_API_KEY != ''
        env:
          MOLTBOOK_API_KEY: ${{ secrets.MOLTBOOK_API_KEY }}
          TAG: ${{ github.ref_name }}
        run: |
          # Extract title from latest commit message first line
          TITLE=$(git log -1 --format=%s)
          BODY="New release: $TAG

          $TITLE

          Audio + video: https://github.com/${{ github.repository }}/releases/tag/$TAG
          Code: https://github.com/${{ github.repository }}/tree/$TAG"

          # Post
          RESP=$(curl -sf -X POST https://www.moltbook.com/api/v1/posts \
            -H "Authorization: Bearer $MOLTBOOK_API_KEY" \
            -H "Content-Type: application/json" \
            -d "$(jq -n --arg t "$TITLE" --arg c "$BODY" \
              '{submolt:"music",submolt_name:"music",title:$t,content:$c}')")

          # Auto-verify (lobster math)
          CODE=$(echo "$RESP" | jq -r '.post.verification.verification_code // empty')
          CHALLENGE=$(echo "$RESP" | jq -r '.post.verification.challenge_text // empty')
          if [ -n "$CODE" ]; then
            # Extract numbers from challenge and compute
            ANSWER=$(echo "$CHALLENGE" | python3 -c "
          import re, sys
          text = sys.stdin.read()
          nums = [float(x) for x in re.findall(r'(\d+(?:\.\d+)?)', text)]
          # Moltbook challenges are simple arithmetic on the first two numbers found
          if len(nums) >= 2:
              print(f'{nums[0] + nums[1]:.2f}')
          ")
            curl -sf -X POST https://www.moltbook.com/api/v1/verify \
              -H "Authorization: Bearer $MOLTBOOK_API_KEY" \
              -H "Content-Type: application/json" \
              -d "$(jq -n --arg c "$CODE" --arg a "$ANSWER" \
                '{verification_code:$c,answer:$a}')"
          fi
